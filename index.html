<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الاحترافية</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --primary: #FFD700; --bg: #0b0b0b; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .logo { color: var(--primary); font-size: 22px; font-weight: bold; }
        
        .movie-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .movie-card { background: var(--card); border-radius: 15px; overflow: hidden; display: flex; flex-direction: row; height: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .movie-card img { width: 110px; height: 100%; object-fit: cover; }
        .movie-details { padding: 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .movie-desc { font-size: 12px; color: #aaa; line-height: 1.4; height: 50px; overflow: hidden; }
        
        .buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; border: none; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .watch-btn { background: var(--primary); color: black; }
        .down-btn { background: #333; color: white; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <div class="logo">قحطاني فيلم</div>
        <div style="font-size: 10px; color: #777;">جودة عالية • بدون نت</div>
    </header>

    <div class="movie-container">
        <!-- فيلم رقم 1 -->
        <div class="movie-card">
            <img src="https://placeholder.com" alt="بوستر">
            <div class="movie-details">
                <div class="movie-title">فيلم الأكشن والسرعة</div>
                <div class="movie-desc">تدور أحداث الفيلم حول مطاردات مثيرة في شوارع المدينة لإنقاذ الفريق من خطر محقق..</div>
                <div class="buttons">
                    <button class="btn watch-btn" onclick="sendAction('watch_001')">مشاهدة</button>
                    <button class="btn down-btn" onclick="sendAction('down_001')">تحميل</button>
                </div>
            </div>
        </div>

        <!-- كرر هذا الجزء لكل فيلم جديد -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendAction(action) {
            tg.sendData(action); // يرسل الأمر للبوت
        }
    </script>
</body>
                </html>
