<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yango Style Library</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --primary-color: #FFD700; /* اللون الأصفر الذهبي */
            --bg-color: #0b0b0b;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* الهيدر */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* سيكشن الأفلام */
        .section-title {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .movie-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            padding: 0 20px 20px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .movie-card:active {
            transform: scale(0.95);
        }

        .movie-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .movie-info {
            padding: 8px;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            background: var(--primary-color);
            color: black;
            border: none;
            width: 100%;
            padding: 6px 0;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        /* شريط سفري بسيط */
        footer {
            height: 50px;
            text-align: center;
            font-size: 10px;
            color: #555;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">مكتبتي</div>
        <div style="font-size: 12px; color: #aaa;">مشاهدة أوفلاين</div>
    </header>

    <div class="section-title">أحدث الإضافات</div>
    
    <div class="movie-container">
        <!-- كارت فيلم 1 -->
        <div class="movie-card" onclick="orderMovie('M001')">
            <img src="https://tmdb.org" alt="فيلم">
            <div class="movie-info">فيلم الأكشن 1</div>
            <button class="download-btn">تحميل</button>
        </div>

        <!-- كارت فيلم 2 -->
        <div class="movie-card" onclick="orderMovie('M002')">
            <img src="https://tmdb.org" alt="فيلم">
            <div class="movie-info">فيلم الدراما 2</div>
            <button class="download-btn">تحميل</button>
        </div>

        <!-- كارت فيلم 3 -->
        <div class="movie-card" onclick="orderMovie('M003')">
            <img src="https://tmdb.org" alt="فيلم">
            <div class="movie-info">مسلسل جديد 1</div>
            <button class="download-btn">تحميل</button>
        </div>
    </div>

    <footer>حقوق النشر محفوظة للبوت الخاص بك</footer>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // لجعل الواجهة تفتح بكامل الشاشة

        function orderMovie(id) {
            // إرسال كود الفيلم للبوت ليقوم البوت بإرسال الملف للمستخدم
            tg.sendData(id); 
            tg.close(); // غلق الواجهة بعد الاختيار (اختياري)
        }
    </script>
</body>
  </html>
